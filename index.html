<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Web Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="control-panel">
            <button id="music-toggle" class="ctrl-btn music-btn">
                <img src="asset/music_on.svg" id="music-icon" alt="Toggle Music">
            </button>
            <button id="restart-btn" class="ctrl-btn restart-btn">
                <img src="asset/restart.svg" alt="Restart">
                <span>Restart</span>
            </button>
        </div>
        <div id="onboarding-text">Tap to drop a candy</div>
        <!-- Content will be added here -->
    </div>
    <script src="script.js"></script>
</body>
</html>
